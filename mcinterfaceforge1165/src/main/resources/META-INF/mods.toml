# File required to load packs as Forge mods.
# Find more information on toml format v0.5.0 here:  https://github.com/toml-lang/toml

# Forge settings, don't touch!
modLoader="javafml"
loaderVersion="[36,)"
license="GPL-3.0-or-later"

[[mods]]
# The ID of your pack.
modId="oneinthechamber"
# Version number.  Can be whatever format you'd like.
version="1.0.0"
# Display name for the pack in the in-game mods list.
displayName="Immersive Vehicles (MTS/IV) - One in the Chamber"
# A URL for the "homepage" for this pack, displayed in the mod UI.
displayURL="https://modrinth.com/project/one-in-the-chamber/"
# Pack logo.
logoFile="vingette.png"
# Authors list, put your name here so people know who made your pack.
authors="cowboycosmic"
# Credits, put the name of helpful contributors here so people know who did the *real* work! d:
credits="Darkura2001"
# The description text for the pack (multi line!)
description='''
